    owasp: A01:2021-Broken Access Control
    scenario: iam_privesc_by_attachment
    vulnerable_source: [cloudgoat/scenarios/aws/iam_privesc_by_attachment/terraform/]
    notes: >
      Attacker leverages iam:PassRole + ec2 instance-profile-attachment permissions to
      launch an EC2 with a far more privileged role, gaining admin.

  - id: cg-iam-privesc-by-ec2
    category: IAM privilege escalation via EC2 role assumption
    cwe: [CWE-269, CWE-266]
    owasp: A01:2021-Broken Access Control
    scenario: iam_privesc_by_ec2
    vulnerable_source: [cloudgoat/scenarios/aws/iam_privesc_by_ec2/terraform/]
    notes: >
      cg_dev_user uses ReadOnly enumeration to find and compromise the admin_ec2 instance
      role and gain administrator permissions.

  - id: cg-iam-privesc-by-key-rotation
    category: IAM privilege escalation via credential/key rotation abuse
    cwe: [CWE-269, CWE-266]
    owasp: A01:2021-Broken Access Control
