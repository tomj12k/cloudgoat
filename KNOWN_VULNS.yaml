    vulnerable_source: [cloudgoat/scenarios/aws/iam_privesc_by_key_rotation/terraform/]
    notes: >
      Starting role that manages other users' credentials abuses key-rotation permissions
      to seize the admin role and read the Secrets Manager flag.

  - id: cg-iam-privesc-by-rollback
    category: IAM privilege escalation via policy version rollback
    cwe: [CWE-269, CWE-266]
    owasp: A01:2021-Broken Access Control
    scenario: iam_privesc_by_rollback
    vulnerable_source: [cloudgoat/scenarios/aws/iam_privesc_by_rollback/terraform/]
    notes: >
      Highly-limited IAM user with SetDefaultPolicyVersion restores a prior policy version
